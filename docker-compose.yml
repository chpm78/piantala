services:
  piantala:
    build:
      context: .
    image: piantala:latest
    container_name: piantala
    restart: unless-stopped
    ports:
      - "${PIANTALA_PORT:-8000}:8000"
    environment:
      SECRET_KEY: "${SECRET_KEY:-change-me}"
      DATABASE_URL: "${DATABASE_URL:-sqlite:////app/instance/piantala.db}"
      UPLOAD_FOLDER: "${UPLOAD_FOLDER:-/app/piantala/static/uploads}"
      GOOGLE_MAPS_API_KEY: "${GOOGLE_MAPS_API_KEY:-}"
      PIANTALA_ADMIN_USERNAME: "${PIANTALA_ADMIN_USERNAME:-}"
      PIANTALA_ADMIN_EMAIL: "${PIANTALA_ADMIN_EMAIL:-}"
      PIANTALA_ADMIN_PASSWORD: "${PIANTALA_ADMIN_PASSWORD:-}"
    volumes:
      - piantala-instance:/app/instance
      - piantala-uploads:/app/piantala/static/uploads
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - |
          import sys, urllib.request
          try:
              with urllib.request.urlopen("http://127.0.0.1:8000/healthz", timeout=5) as response:
                  sys.exit(0 if response.status == 200 else 1)
          except Exception:
              sys.exit(1)
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

volumes:
  piantala-instance:
    name: piantala_instance
  piantala-uploads:
    name: piantala_uploads
